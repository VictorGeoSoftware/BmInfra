# ============================================================
# Port-based routing (no domain yet).
#   :80  -> PROD backend  (backend-prod:8081)
#   :81  -> QA   backend  (backend-qa:8081)
#
# n8n is reached directly on its published ports until a domain is
# available, at which point switch to server_name-based virtual hosts.
# ============================================================

events {
    worker_connections 1024;
}

http {
    sendfile on;
    client_max_body_size 50M;

    # ─── PROD backend ───
    server {
        listen 80;
        server_name _;

        location /api/v1/ {
            proxy_pass http://backend-prod:8081/api/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            proxy_pass http://backend-prod:8081/health;
        }
    }

    # ─── QA backend ───
    server {
        listen 81;
        server_name _;

        location /api/v1/ {
            proxy_pass http://backend-qa:8081/api/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            proxy_pass http://backend-qa:8081/health;
        }
    }
}
